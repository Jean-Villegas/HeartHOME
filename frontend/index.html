<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Salud | Acceso</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="glass-panel" id="auth-panel">
    <h1 class="logo-text">SistemaSalud.</h1>
    
    <!-- Alertas -->
    <div id="alert-box" class="alert hidden"></div>

    <!-- Formulario de Login -->
    <div id="login-form-container">
      <h2>Bienvenido de nuevo</h2>
      <p class="subtitle">Ingresa tus credenciales para acceder</p>
      
      <form id="login-form">
        <div class="form-group">
          <label>Usuario</label>
          <input type="text" id="login-username" required autocomplete="username">
        </div>
        <div class="form-group">
          <label>Contraseña</label>
          <input type="password" id="login-password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary" id="btn-login">Ingresar al Sistema</button>
      </form>
      
      <div class="toggle-form">
        ¿No tienes una cuenta? <span id="to-register">Regístrate ahora</span>
      </div>
    </div>

    <!-- Formulario de Registro (Oculto por defecto) -->
    <div id="register-form-container" class="hidden">
      <h2>Crear Cuenta</h2>
      <p class="subtitle">Únete como paciente para iniciar</p>
      
      <form id="register-form">
        <div class="form-group">
          <label>Nombre de Usuario</label>
          <input type="text" id="reg-username" required>
        </div>
        <div class="form-group">
          <label>Cédula de Identidad</label>
          <input type="text" id="reg-cedula" required>
        </div>
        <div class="form-group">
          <label>Correo Electrónico</label>
          <input type="email" id="reg-email" required>
        </div>
        <div class="form-group">
          <label>Contraseña</label>
          <input type="password" id="reg-password" required>
        </div>
        <div class="form-group">
          <label>Soy un...</label>
          <select id="reg-rol">
            <option value="Cliente">Paciente</option>
            <option value="Medico">Médico Especialista</option>
          </select>
        </div>
        <button type="submit" class="btn btn-primary" id="btn-register">Completar Registro</button>
      </form>
      
      <div class="toggle-form">
        ¿Ya eres usuario? <span id="to-login">Inicia Sesión</span>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/validators.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
